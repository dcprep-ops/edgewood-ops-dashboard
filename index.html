<style>
:root {
  --navy:#1a3a5c;--teal:#0d9488;--teal-lt:#e1f5ee;
  --amber:#f59e0b;--red:#dc2626;--red-lt:#fef2f2;
  --muted:#94a3b8;--border:rgba(0,0,0,.09);--card:#fff;
  --bg:#f8fafc;--lt:#f1f5f9;--text:#1e293b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* HEADER */
.hdr{background:var(--navy);padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 16px;position:sticky;top:0;z-index:100}
.hdr-brand{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px}
.hdr-cluster{font-size:20px;font-weight:700;color:#fff}
.hdr-schools{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px}
.hdr-meta{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}

/* SECTION LIST */
.section-list{padding:20px 16px}
.section-card{display:flex;align-items:center;gap:14px;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.section-card:active{border-color:var(--teal)}
.cell-icon-box{width:40px;height:40px;border-radius:10px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cell-icon-box.teal{background:var(--teal)}
.cell-icon-box i{color:#fff;font-size:20px}
.section-icon{font-size:22px;flex-shrink:0;width:36px;text-align:center}
.section-text{flex:1}
.section-name{font-size:15px;font-weight:600;color:var(--navy)}
.section-sub{font-size:12px;color:var(--muted);margin-top:2px}
.section-arrow{font-size:18px;color:var(--teal);font-weight:600}

/* DETAIL */
.detail{display:none}
.detail.active{display:block}
.back-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--card);border-bottom:0.5px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;position:sticky;top:0;z-index:50}
.back-txt{font-size:14px;color:var(--teal);font-weight:500}
.back-title{font-size:14px;font-weight:600;color:var(--navy)}
.detail-body{padding:20px 16px 60px}

/* SHARED */
.card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.card-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.divider{height:0.5px;background:var(--border);margin:16px 0}
.no-data{font-size:12px;color:var(--muted);font-style:italic;padding:6px 0}
.error-box{background:#fef2f2;border:0.5px solid #fecaca;border-radius:8px;padding:16px;color:#991b1b;font-size:13px;margin:20px 16px}
.loading-msg{text-align:center;color:var(--muted);font-size:14px;padding:48px 20px}

/* DRILLS */
.drill-type-lbl{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
.month-row{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:4px}
.month-cell{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;min-width:26px}
.month-lbl{font-size:9px;color:var(--muted)}
.dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.dot-ok{background:var(--teal);color:#fff}
.dot-slow{background:var(--amber);color:#fff}
.dot-none{background:var(--red-lt);color:var(--red)}
.dot-future{background:var(--lt);color:var(--muted)}
.last-drill-card{background:var(--lt);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.last-drill-type{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:8px}
.stat-line{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:0.5px solid var(--border)}
.stat-line:last-child{border-bottom:none}
.stat-key{color:var(--muted)}
.stat-val{color:var(--navy);font-weight:500;max-width:60%;text-align:right}
.stat-val.ok{color:var(--teal)}.stat-val.warn{color:var(--amber)}.stat-val.flag{color:var(--red)}

/* ARRIVAL */
.session-hdr{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin:0 0 10px}
.session-hdr.arr{color:#085041}.session-hdr.dis{color:#1e40af}
.r-table{width:100%;border-collapse:collapse;margin-bottom:6px}
.r-table thead th{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:0 0 6px;border-bottom:0.5px solid var(--border)}
.r-table tbody td{padding:7px 0;border-bottom:0.5px solid rgba(0,0,0,.05);vertical-align:middle}
.r-table tbody tr:last-child td{border-bottom:none}
.bar-track{height:7px;background:var(--lt);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.n-lbl{font-size:10px;margin-top:6px;margin-bottom:10px}
.flags-title{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
.flag-item{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,.05)}
.flag-item:last-child{border-bottom:none}
.flag-name{color:var(--navy);flex:1;padding-right:10px}
.flag-pct{color:var(--red);font-weight:500;flex-shrink:0}

/* CUSTODIAL */
.sparkline{display:flex;align-items:flex-end;gap:3px;height:44px;margin:10px 0 2px}
.spark-bar{flex:1;border-radius:2px 2px 0 0;min-height:4px}
.spark-good{background:var(--teal)}.spark-mid{background:var(--amber)}
.spark-low{background:var(--red)}.spark-null{background:var(--border)}
.pct-big{font-size:28px;font-weight:700}

/* TABS */
.camp-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px}
.camp-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;-webkit-tap-highlight-color:transparent}
.camp-tab.active{color:var(--navy);border-bottom-color:var(--teal);font-weight:700}
/* IMPROVE */
.improve-item{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px}
.improve-item:last-child{border-bottom:none}
.improve-name{color:var(--navy);flex:1;padding-right:10px;font-weight:500}
.improve-right{text-align:right;flex-shrink:0}
.flag-rate-val{font-size:14px;font-weight:700;color:var(--red)}
.prior-rate-val{font-size:10px;color:var(--muted);display:block}
.badge-focus{background:var(--red-lt);color:#991b1b;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;margin-left:6px}
.badge-improving{background:var(--teal-lt);color:#0f6e56;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;margin-left:6px}
.badge-stable{background:var(--lt);color:var(--muted);font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;margin-left:6px}

/* READINESS — matching BOY Readiness Dashboard */
.cr-section { margin-bottom: 20px; }
.cr-section-hdr { font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px; }
.cr-section-hdr.needs  { color:var(--red); }
.cr-section-hdr.minor  { color:var(--amber); }
.cr-section-hdr.full   { color:var(--teal); }
.cr-section-hdr.unseen { color:var(--muted); }
.cr-row { display:flex;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--border); }
.cr-row:last-child { border-bottom:none; }
.cr-left { display:flex;align-items:flex-start;gap:10px;flex:1; }
.cr-dot { width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px; }
.dot-full   { background:var(--teal); }
.dot-minor  { background:var(--amber); }
.dot-needs  { background:var(--red); }
.dot-unseen { background:var(--border); }
.cr-name { font-size:14px;font-weight:500;color:var(--navy); }
.cr-grade { font-size:12px;color:var(--muted);margin-left:2px; }
.cr-date { font-size:11px;color:var(--muted);margin-top:3px; }
.cr-assessment { font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:4px; }
.asmnt-full  { background:#f0fdf4;color:#166534; }
.asmnt-minor { background:#fef9c3;color:#854d0e; }
.asmnt-needs { background:#fef2f2;color:#991b1b; }
.ready-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.ready-stat{background:var(--lt);border-radius:10px;padding:12px 8px;text-align:center}
.ready-val{font-size:22px;font-weight:700}
.ready-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;line-height:1.3}
.room-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.room-row:last-child{border-bottom:none}
.room-name{color:var(--navy);font-weight:500;flex:1}
.rb{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.rb-ready{background:var(--teal-lt);color:#0f6e56}
.rb-minor{background:#fefce8;color:#92400e}
.rb-flag{background:var(--red-lt);color:#991b1b}
</style>
</head>
<body>

<div class="hdr" id="hdr-main">
  <div class="hdr-brand">DC Prep</div>
  <div class="hdr-cluster">Edgewood Ops Dashboard</div>
  <div class="hdr-schools">EEC · EMC</div>
  <div class="hdr-meta" id="meta"></div>
</div>
<div class="hdr hdr-detail" id="hdr-detail" style="display:none">
  <button onclick="go('home')" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent">← Back to Edgewood Ops Dashboard</button>
  <div class="hdr-cluster" id="hdr-detail-title"></div>
  <div class="hdr-schools">EEC · EMC</div>
</div>

<!-- LANDING -->
<div id="home">
  <div id="home-loading" class="loading-msg">Loading…</div>
  <div class="section-list" id="section-list" style="display:none">
    <div class="section-card" onclick="go('drills')">
      <div class="cell-icon-box"><i class="ti ti-alert-triangle"></i></div>
      <div class="section-text">
        <div class="section-name">Evacuation &amp; Lockdown Drills</div>
        <div class="section-sub" id="sub-drills">Evacuation &amp; lockdown compliance</div>
      </div>
      <div class="section-arrow">›</div>
    </div>
    <div class="section-card" onclick="go('arrival')">
      <div class="cell-icon-box teal"><i class="ti ti-car"></i></div>
      <div class="section-text">
        <div class="section-name">Arrival &amp; Dismissal</div>
        <div class="section-sub" id="sub-arrival">Last observation window</div>
      </div>
      <div class="section-arrow">›</div>
    </div>
    <div class="section-card" onclick="go('custodial')">
      <div class="cell-icon-box"><i class="ti ti-spray"></i></div>
      <div class="section-text">
        <div class="section-name">Custodial Walkthroughs</div>
        <div class="section-sub" id="sub-custodial">Walkthrough completion trend</div>
      </div>
      <div class="section-arrow">›</div>
    </div>
    <div class="section-card" onclick="go('readiness')">
      <div class="cell-icon-box teal"><i class="ti ti-chalkboard"></i></div>
      <div class="section-text">
        <div class="section-name">Classroom Readiness</div>
        <div class="section-sub" id="sub-readiness">BOY readiness by classroom</div>
      </div>
      <div class="section-arrow">›</div>
    </div>
  </div>
  <div id="home-error"></div>
</div>

<!-- DETAIL SCREENS -->
<div id="d-drills"    class="detail"></div>
<div id="d-arrival"   class="detail"></div>
<div id="d-custodial" class="detail"></div>
<div id="d-readiness" class="detail"></div>

<script>

const CLASSROOMS = {
  AEC: [
    {name:'American',grade:'EC'},{name:'Gallaudet',grade:'EC'},{name:'George Mason',grade:'EC'},
    {name:'Johns Hopkins',grade:'EC'},{name:'Syracuse',grade:'EC'},{name:'Williams',grade:'EC'},
    {name:'Northwestern',grade:'K'},{name:'UChicago',grade:'K'},{name:'UMichigan',grade:'K'},
    {name:'Gonzaga',grade:'1'},{name:'UOregon',grade:'1'},{name:'Pepperdine',grade:'1'},
    {name:'Morehouse',grade:'2'},{name:'Spelman',grade:'2'},{name:'Xavier',grade:'2'},
    {name:'Cornell',grade:'3'},{name:'Dartmouth',grade:'3'},{name:'UPenn',grade:'3'},
  ],
  AMC: [
    {name:'GWU',grade:'4'},{name:'Georgetown',grade:'4'},{name:'Howard',grade:'4'},
    {name:'UMD',grade:'5'},{name:'UNC',grade:'5'},{name:'UVA',grade:'5'},
    {name:'FAMU',grade:'6'},{name:'Hampton',grade:'6'},{name:'Tuskegee',grade:'6'},
    {name:'Princeton',grade:'7'},{name:'Stanford',grade:'7'},
    {name:'Harvard',grade:'8'},{name:'Yale',grade:'8'},
  ],
  BEC: [
    {name:'American',grade:'EC'},{name:'Gallaudet',grade:'EC'},{name:'George Mason',grade:'EC'},
    {name:'Johns Hopkins',grade:'EC'},{name:'Syracuse',grade:'EC'},{name:'Williams',grade:'EC'},
    {name:'Northwestern',grade:'K'},{name:'UChicago',grade:'K'},{name:'UMichigan',grade:'K'},
    {name:'Gonzaga',grade:'1'},{name:'UOregon',grade:'1'},{name:'Pepperdine',grade:'1'},
    {name:'Morehouse',grade:'2'},{name:'Spelman',grade:'2'},{name:'Xavier',grade:'2'},
    {name:'Cornell',grade:'3'},{name:'Dartmouth',grade:'3'},{name:'UPenn',grade:'3'},
  ],
  BMC: [
    {name:'GWU',grade:'4'},{name:'Georgetown',grade:'4'},{name:'Howard',grade:'4'},
    {name:'UMD',grade:'5'},{name:'UNC',grade:'5'},{name:'UVA',grade:'5'},
    {name:'FAMU',grade:'6'},{name:'Hampton',grade:'6'},{name:'Tuskegee',grade:'6'},
    {name:'Princeton',grade:'7'},{name:'Stanford',grade:'7'},
    {name:'Harvard',grade:'8'},{name:'Yale',grade:'8'},
  ],
  EEC: [
    {name:'American',grade:'EC'},{name:'Gallaudet',grade:'EC'},{name:'George Mason',grade:'EC'},
    {name:'Johns Hopkins',grade:'EC'},{name:'Syracuse',grade:'EC'},
    {name:'Northwestern',grade:'K'},{name:'UChicago',grade:'K'},{name:'UMichigan',grade:'K'},
    {name:'Gonzaga',grade:'1'},{name:'UOregon',grade:'1'},{name:'Pepperdine',grade:'1'},
    {name:'Morehouse',grade:'2'},{name:'Spelman',grade:'2'},{name:'Xavier',grade:'2'},
    {name:'Cornell',grade:'3'},{name:'Dartmouth',grade:'3'},{name:'UPenn',grade:'3'},
  ],
  EMC: [
    {name:'GWU',grade:'4'},{name:'Georgetown',grade:'4'},{name:'Howard',grade:'4'},
    {name:'UMD',grade:'5'},{name:'UNC',grade:'5'},{name:'UVA',grade:'5'},
    {name:'FAMU',grade:'6'},{name:'Hampton',grade:'6'},{name:'Tuskegee',grade:'6'},
    {name:'Princeton',grade:'7'},{name:'Stanford',grade:'7'},
    {name:'Harvard',grade:'8'},{name:'Yale',grade:'8'},
  ],
};

function gradeLabel(g) {
  return g==='EC'?'EC':g==='K'?'Kindergarten':g+(g==='1'?'st':g==='2'?'nd':g==='3'?'rd':'th')+' Grade';
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPbhFWpzKX6S6seb1c0QKplVM22LjZG6bkGMBnTNopry6dDr5YGtffKKR3EsFQ77n5BQ/exec';
const CLUSTER  = 'Benning';   // e.g. 'Anacostia'
const CAMPUSES = ["EEC", "EMC"];   // e.g. ['AEC','AMC']

let OPS = null, READINESS = null, WIN = 14;

// ── NAVIGATION ──────────────────────────────────────────────────────────
function go(section) {
  ['home','d-drills','d-arrival','d-custodial','d-readiness'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.display = 'none'; el.classList.remove('active'); }
  });
  const dest = section === 'home' ? 'home' : 'd-'+section;
  const el = document.getElementById(dest);
  if (el) { el.style.display = ''; el.classList.add('active'); }
  // Toggle headers
  const isHome = section === 'home';
  document.getElementById('hdr-main').style.display   = isHome ? '' : 'none';
  document.getElementById('hdr-detail').style.display = isHome ? 'none' : '';
  window.scrollTo(0,0);
  if (section !== 'home' && OPS) render(section);
}

function render(s) {
  if (s==='drills')    renderDrills();
  if (s==='arrival')   renderArrival();
  if (s==='custodial') renderCustodial();
  if (s==='readiness') renderReadiness();
}

function backBar(title) {
  document.getElementById('hdr-main').style.display = 'none';
  document.getElementById('hdr-detail').style.display = '';
  document.getElementById('hdr-detail-title').textContent = title;
  return '';  // no inline back bar
}

function e(tag, cls, html) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html !== undefined) el.innerHTML = html;
  return el;
}

// ── LOAD DATA ────────────────────────────────────────────────────────────
async function load() {
  try {
    const [ops, readiness] = await Promise.all([
      fetch(SCRIPT_URL+'?view=ops').then(r=>r.json()),
      fetch(SCRIPT_URL+'?view=readiness').then(r=>r.json()),
    ]);
    OPS = ops; READINESS = readiness; WIN = ops.window || 14;
    document.getElementById('home-loading').style.display = 'none';
    document.getElementById('section-list').style.display = '';
    document.getElementById('meta').textContent =
      new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    buildSubs();
  } catch(err) {
    document.getElementById('home-loading').style.display = 'none';
    document.getElementById('home-error').innerHTML =
      `<div class="error-box"><strong>Could not load data.</strong><br>${err.message}</div>`;
  }
}

function clusterArr() { return (OPS.arrival||[]).find(c=>c.cluster===CLUSTER); }
function clusterCust(){ return (OPS.custodial||[]).find(c=>c.cluster===CLUSTER); }

function buildSubs() {
  // Drills — date of most recent drill across both campuses
  const lastDates = CAMPUSES.flatMap(cam => {
    const ld = (OPS.drills?.lastDrills||[]).find(d=>d.campus===cam);
    return [ld?.evac?.date, ld?.lock?.date].filter(Boolean);
  });
  document.getElementById('sub-drills').textContent =
    lastDates.length ? 'Last drill: ' + lastDates[0] : 'No drills logged yet';

  // A&D
  const cl = clusterArr();
  const an = cl?.arrival?.current?.n || 0;
  const dn = cl?.dismissal?.current?.n || 0;
  document.getElementById('sub-arrival').textContent =
    `${an} arrival · ${dn} dismissal obs in last ${WIN} days`;

  // Custodial
  const cc = clusterCust();
  document.getElementById('sub-custodial').textContent =
    cc?.currentPct !== null && cc?.currentPct !== undefined
      ? `${cc.currentPct}% items checked this period`
      : 'No walkthroughs logged yet';

  // Readiness
  const subs = (READINESS?.submissions||[]).filter(s=>CAMPUSES.includes(s.campus_code));
  const rooms = new Set(subs.map(s=>s.classroom)).size;
  document.getElementById('sub-readiness').textContent =
    rooms ? `${rooms} classroom${rooms>1?'s':''} assessed` : 'No assessments logged yet';
}

// ── DRILLS ───────────────────────────────────────────────────────────────
function renderDrills() {
  const con = document.getElementById('d-drills');
  const months = OPS.drills?.months || [];
  const syStart = OPS.drills?.syStart || new Date().getFullYear();
  const today = new Date();

  function dots(statuses) {
    return months.map((m,mi) => {
      const yr = m.num>=8 ? syStart : syStart+1;
      const past = new Date(yr,m.num-1,1) < today;
      const st = statuses?.[mi] || 'none';
      const cls = !past ? 'dot-future' : st==='ok' ? 'dot-ok' : st==='slow' ? 'dot-slow' : 'dot-none';
      const sym = !past ? '' : st==='ok'||st==='slow' ? '✓' : '!';
      return `<div class="month-cell"><div class="month-lbl">${m.label}</div><div class="dot ${cls}">${sym}</div></div>`;
    }).join('');
  }

  let html = backBar('Evacuation & Lockdown Drills') + '<div class="detail-body">';

  CAMPUSES.forEach(campus => {
    const comp = (OPS.drills?.compliance||[]).find(d=>d.campus===campus);
    const last = (OPS.drills?.lastDrills||[]).find(d=>d.campus===campus);

    html += `<div class="card">
      <div style="font-size:18px;font-weight:700;color:var(--navy);padding-bottom:12px;margin-bottom:12px;border-bottom:2px solid var(--border)">${campus}</div>`;
    html += `<div class="drill-type-lbl">Evacuation</div>`;
    html += `<div class="month-row">${dots(comp?.evac)}</div>`;
    html += `<div class="drill-type-lbl" style="margin-top:16px">Lockdown</div>`;
    html += `<div class="month-row">${dots(comp?.lock)}</div>`;
    html += '</div>';

    html += '<div class="card"><div style="font-size:16px;font-weight:700;color:var(--navy);padding-bottom:10px;margin-bottom:10px;border-bottom:1.5px solid var(--border)">Most recent drills — '+campus+'</div>';
    ['evac','lock'].forEach(type => {
      const drill = last?.[type];
      const label = type==='evac' ? 'Evacuation' : 'Lockdown';
      html += `<div class="last-drill-card"><div class="last-drill-type">${label}</div>`;
      if (!drill) {
        html += `<div class="no-data">No drill logged yet</div>`;
      } else {
        const dc = drill.under10 ? 'ok' : 'warn';
        const flagLines = drill.flags ? drill.flags.split(';').map(f=>f.trim()).filter(Boolean) : [];
        html += `<div class="stat-line"><span class="stat-key">Date</span><span class="stat-val">${drill.date}</span></div>`;
        html += `<div class="stat-line"><span class="stat-key">Duration</span><span class="stat-val ${dc}">${drill.duration}${drill.under10?' ✓':' — over goal'}</span></div>`;
        if (flagLines.length) {
          html += `<div class="stat-line" style="align-items:flex-start"><span class="stat-key">Improvement opportunities</span><span class="stat-val flag" style="display:flex;flex-direction:column;gap:3px">${flagLines.map(f=>`<span>${f}</span>`).join('')}</span></div>`;
        } else {
          html += `<div class="stat-line"><span class="stat-key">Improvement opportunities</span><span class="stat-val ok">None flagged</span></div>`;
        }
        if (drill.notes) html += `<div class="stat-line"><span class="stat-key">Notes</span><span class="stat-val">${drill.notes}</span></div>`;
      }
      html += '</div>';
    });
    html += '</div>';
  });

  html += '</div>';
  con.innerHTML = html;
}

// ── ARRIVAL ───────────────────────────────────────────────────────────────
const AD_LABELS = {
  'Crossing guard present':'Crossing guard coverage',
  'Arrival / dismissal zones free of obstructions':'Keeping arrival/dismissal zones clear',
  'No unauthorized vehicles in student loading zones':'Unauthorized vehicles in loading zones',
  'All staff members at duty posts':'Staff coverage at duty posts',
  'Staff members attentive — not on phones':'Staff attentiveness during transitions',
  'Staff behaviors support positive student behaviors and transitions':'Staff behaviors during transitions',
  'Staff positioned to maximize visibility of students':'Staff positioning for visibility',
  'Students moving with purpose, minimal crowding':'Student movement and crowding',
  'Drop-off / pick-up line moving efficiently':'Drop-off / pick-up line efficiency',
  'Students needing support identified and assisted promptly':'Identifying students who need support',
};
const RATINGS = [
  {label:'Strong',    key:'strong',   color:'#1d9e75'},
  {label:'OK',        key:'ok',       color:'#2a78d6'},
  {label:'Needs work',key:'needsWork',color:'#e24b4a'},
];

function ratingTable(curr, prior) {
  let t = `<table class="r-table"><thead><tr>
    <th class="th-name" style="text-align:left;width:80px"></th>
    <th style="text-align:left"></th>
    <th style="text-align:right;width:36px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:0 0 6px;border-bottom:0.5px solid var(--border)">Last</th>
    <th style="width:8px;padding:0 0 6px;border-bottom:0.5px solid var(--border)"></th>
    <th style="text-align:right;width:36px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:0 0 6px;border-bottom:0.5px solid var(--border)">Prior</th>
    <th style="text-align:right;width:32px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:0 0 6px;border-bottom:0.5px solid var(--border)">Δ</th>
  </tr></thead><tbody>`;
  RATINGS.forEach((r,ri) => {
    const cp = curr[r.key]||0;
    const pp = prior ? (prior[r.key]||0) : null;
    const d = pp!==null ? cp-pp : null;
    const ds = d===null?'—':d>0?'+'+d:d<0?'−'+Math.abs(d):'0';
    const dc = d===null||d===0?'var(--muted)':r.key==='needsWork'?(d>0?'var(--red)':'#0f6e56'):(d>0?'#0f6e56':'var(--red)');
    const last = ri===RATINGS.length-1;
    t += `<tr style="${last?'':'border-bottom:0.5px solid rgba(0,0,0,.05)'}">
      <td style="font-size:12px;color:var(--text);padding:7px 10px 7px 0;vertical-align:middle">${r.label}</td>
      <td style="padding:7px 10px 7px 0;vertical-align:middle"><div class="bar-track"><div class="bar-fill" style="width:${cp}%;background:${r.color}"></div></div></td>
      <td style="font-size:12px;font-weight:500;color:var(--navy);text-align:right;vertical-align:middle;font-variant-numeric:tabular-nums">${cp}%</td>
      <td style="font-size:11px;color:var(--border);text-align:center;vertical-align:middle;padding:0 2px">·</td>
      <td style="font-size:11px;color:var(--muted);text-align:right;vertical-align:middle;font-variant-numeric:tabular-nums">${pp!==null?pp+'%':'—'}</td>
      <td style="font-size:11px;text-align:right;vertical-align:middle;color:${dc};font-variant-numeric:tabular-nums">${ds}</td>
    </tr>`;
  });
  return t + '</tbody></table>';
}

function renderArrival() {
  const con = document.getElementById('d-arrival');
  const cl = clusterArr();
  let html = backBar('Arrival & Dismissal') + '<div class="detail-body">';
  if (!cl) { html += '<div class="no-data">No data available.</div></div>'; con.innerHTML=html; return; }

  ['arrival','dismissal'].forEach(session => {
    const sData = cl[session];
    const curr = sData?.current, prior = sData?.prior;
    const label = session==='arrival' ? 'Arrival' : 'Dismissal';
    const hcls  = session==='arrival' ? 'arr' : 'dis';
    html += `<div class="card"><div class="session-hdr ${hcls}">${label}</div>`;
    if (!curr || curr.n===0) {
      html += `<div class="no-data">No ${label.toLowerCase()} observations in the last ${WIN} days.</div>`;
    } else {
      const low = curr.n < 5;
      html += ratingTable(curr, prior);
      html += `<div class="n-lbl" style="color:${low?'#b45309':'var(--muted)'}">n = ${curr.n} (last ${WIN} days)${prior?' · n = '+prior.n+' (prior '+WIN+' days)':''}${low?' &nbsp;⚠ low volume':''}</div>`;
      if (sData.flags?.length) {
        html += `<div class="flags-title">Improvement opportunities</div>`;
        sData.flags.forEach(f => {
          html += `<div class="flag-item"><span class="flag-name">${AD_LABELS[f.item]||f.item}</span><span class="flag-pct">${f.rate}%</span></div>`;
        });
      }
    }
    html += '</div>';
  });
  html += '</div>';
  con.innerHTML = html;
}

// ── CUSTODIAL ─────────────────────────────────────────────────────────────
function renderCustodial() {
  const con = document.getElementById('d-custodial');
  const cl = clusterCust();
  const cw = cl?.window || WIN;
  let html = backBar('Custodial Walkthroughs') + '<div class="detail-body">';
  if (!cl) { html += '<div class="no-data">No custodial data available.</div></div>'; con.innerHTML=html; return; }

  const pct = cl.currentPct, prev = cl.priorPct;
  const pc = pct===null?'var(--muted)':pct>=80?'var(--teal)':pct>=65?'var(--amber)':'var(--red)';
  html += '<div class="card"><div class="card-label">% items checked</div>';
  html += `<div class="pct-big" style="color:${pc}">${pct!==null?pct+'%':'—'}</div>`;
  html += `<div style="font-size:11px;color:var(--muted);margin-top:4px">${cl.n>0?`Based on ${cl.n} walkthrough${cl.n>1?'s':''} in last ${cw} days`:'No walkthroughs in this period'}</div>`;
  if (prev!==null && pct!==null) {
    const d=pct-prev;
    const a=d>=3?'↑':d<=-3?'↓':'→';
    const ac=d>=3?'var(--teal)':d<=-3?'var(--amber)':'var(--muted)';
    html += `<div style="font-size:12px;color:var(--muted);margin-top:4px">${a} from <span style="color:${ac}">${prev}%</span> prior period</div>`;
  }
  const sparks = (cl.trend||[]).map(m => {
    if (m.pct===null) return `<div class="spark-bar spark-null" style="height:20%"></div>`;
    const cls=m.pct>=80?'spark-good':m.pct>=65?'spark-mid':'spark-low';
    return `<div class="spark-bar ${cls}" style="height:${Math.max(20,m.pct)}%" title="${m.label}: ${m.pct}%"></div>`;
  }).join('');
  html += `<div class="sparkline">${sparks}</div>`;
  const lbls = (cl.trend||[]).map(m=>`<span style="font-size:9px;color:var(--muted);flex:1;text-align:center">${m.label}</span>`).join('');
  html += `<div style="display:flex;gap:3px">${lbls}</div></div>`;

  // Where we can improve — item-level flag frequency
  if (cl.flags?.length) {
    html += '<div class="card"><div class="card-label">Where we can improve</div>';
    cl.flags.forEach(f => {
      const itemName = f.item.includes(' — ') ? f.item.split(' — ')[1] : f.item;
      const spaceName = f.item.includes(' — ') ? f.item.split(' — ')[0] : '';
      const bc = f.trend==='focus' ? 'badge-focus' : f.trend==='improving' ? 'badge-improving' : 'badge-stable';
      const bl = f.trend==='focus' ? 'Focus area' : f.trend==='improving' ? 'Improving' : 'Stable';
      html += `<div class="improve-item">
        <div style="flex:1">
          <span class="improve-name">${itemName}</span>
          ${spaceName ? `<span style="font-size:10px;color:var(--muted);display:block;margin-top:2px">${spaceName}</span>` : ''}
          <span class="${bc}">${bl}</span>
        </div>
        <div class="improve-right">
          <span class="flag-rate-val">${f.curr}%</span>
          <span class="prior-rate-val">${f.prior}% prior</span>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  // Walkthrough notes
  if (cl.notes?.length) {
    html += '<div class="card"><div class="card-label">Walkthrough notes</div>';
    cl.notes.forEach(n => {
      html += `<div style="font-size:12px;color:var(--text);padding:8px 0;border-bottom:0.5px solid var(--border);line-height:1.5">
        <div style="font-size:10px;color:var(--muted);margin-bottom:3px">${n.campus} · ${n.date} · ${n.role}</div>
        ${n.note}
      </div>`;
    });
    html += '</div>';
  }

  if (cl.notes?.length) {
    html += '<div class="card"><div class="card-label">Recent notes</div>';
    cl.notes.forEach(n => { html += `<div style="font-size:12px;color:var(--text);padding:6px 0;border-bottom:0.5px solid var(--border)">${n.note}</div>`; });
    html += '</div>';
  }
  html += '</div>';
  con.innerHTML = html;
}

// ── READINESS ─────────────────────────────────────────────────────────────
function renderReadiness() {
  const con = document.getElementById('d-readiness');
  const CAMPUS_NAMES = {AEC:'Anacostia Elementary',AMC:'Anacostia Middle',BEC:'Benning Elementary',BMC:'Benning Middle',EEC:'Edgewood Elementary',EMC:'Edgewood Middle'};
  const subs = (READINESS?.submissions||[]).filter(s =>
    CAMPUSES.includes(s.campus_code) || CAMPUSES.some(c => CAMPUS_NAMES[c]===s.school)
  );

  let html = backBar('Classroom Readiness') + '<div class="detail-body">';

  // Build latest map
  const latest = {};
  subs.forEach(s => {
    const key = (s.campus_code||'') + '|' + s.classroom;
    if (!latest[key] || new Date(s.timestamp) > new Date(latest[key].timestamp)) latest[key] = s;
  });

  function formatDate(ts) {
    if (!ts) return null;
    const d = ts instanceof Date ? ts : new Date(ts);
    return isNaN(d) ? null : d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  const groups = [
    { key:'needs',  label:'Not Ready — Return Visit Needed', cls:'needs',
      filter: (camp,room) => { const s=latest[camp+'|'+room]; return s && s.assessment==='Not ready — return visit needed'; }},
    { key:'unseen', label:'Not Yet Assessed', cls:'unseen',
      filter: (camp,room) => !latest[camp+'|'+room] },
    { key:'minor',  label:'Ready — Minor Items', cls:'minor',
      filter: (camp,room) => { const s=latest[camp+'|'+room]; return s && s.assessment==='Ready — minor items remain'; }},
    { key:'full',   label:'Fully Ready', cls:'full',
      filter: (camp,room) => { const s=latest[camp+'|'+room]; return s && s.assessment==='Fully ready'; }},
  ];

  function campusPanel(campus) {
    const rooms = CLASSROOMS[campus] || [];
    if (!rooms.length) return '';

    const needAttn = rooms.filter(r => {
      const s = latest[campus+'|'+r.name];
      return !s || s.assessment==='Not ready — return visit needed';
    }).length;
    const complete = rooms.filter(r => {
      const s = latest[campus+'|'+r.name];
      return s && (s.assessment==='Fully ready'||s.assessment==='Ready — minor items remain');
    }).length;

    let p = `<div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--red)">${needAttn}</div><div style="font-size:10px;color:var(--muted)">Need attention</div></div>
      <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--teal)">${complete}</div><div style="font-size:10px;color:var(--muted)">Complete</div></div>
      <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--navy)">${rooms.length}</div><div style="font-size:10px;color:var(--muted)">Total rooms</div></div>
    </div>`;

    groups.forEach(g => {
      const groupRooms = rooms.filter(r => g.filter(campus, r.name));
      if (!groupRooms.length) return;
      p += `<div class="cr-section">`;
      p += `<div class="cr-section-hdr ${g.cls}">${g.label} &nbsp;(${groupRooms.length})</div>`;
      groupRooms.forEach(r => {
        const sub = latest[campus+'|'+r.name];
        const dateStr = sub ? formatDate(sub.timestamp) : null;
        const dotCls   = g.key==='full'?'dot-full':g.key==='minor'?'dot-minor':g.key==='needs'?'dot-needs':'dot-unseen';
        const asmntCls = g.key==='full'?'asmnt-full':g.key==='minor'?'asmnt-minor':g.key==='needs'?'asmnt-needs':'';
        const asmntTxt = g.key==='unseen'?'Not assessed':g.key==='full'?'Fully ready':g.key==='minor'?'Minor items':'Not ready';
        p += `<div class="cr-row">
          <div class="cr-left">
            <div class="cr-dot ${dotCls}"></div>
            <div>
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span class="cr-name">${r.name}</span>
                <span class="cr-grade">(${gradeLabel(r.grade)})</span>
                ${asmntCls?`<span class="cr-assessment ${asmntCls}">${asmntTxt}</span>`:''}
              </div>
              ${dateStr?`<div class="cr-date">Last assessment: ${dateStr}</div>`:''}
            </div>
          </div>
        </div>`;
      });
      p += '</div>';
    });
    return p;
  }

  // Tabs for the two campuses in the cluster
  html += `<div class="camp-tabs">
    <div class="camp-tab active" id="tab-EEC" onclick="switchCampusTab('EEC')">EEC</div>
    <div class="camp-tab" id="tab-EMC" onclick="switchCampusTab('EMC')">EMC</div>
  </div>`;

  CAMPUSES.forEach((campus, i) => {
    html += `<div class="card" id="panel-${campus}" style="${i>0?'display:none':''}">
      ${campusPanel(campus)}
    </div>`;
  });

  html += '</div>';
  con.innerHTML = html;
}

function switchCampusTab(campus) {
  CAMPUSES.forEach(c => {
    const tab = document.getElementById('tab-'+c);
    const panel = document.getElementById('panel-'+c);
    if (tab) tab.classList.toggle('active', c===campus);
    if (panel) panel.style.display = c===campus ? '' : 'none';
  });
}
